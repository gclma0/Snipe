services:
  - type: web
    name: snipe-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ENABLE_DOCS
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: candidate-documents
      - key: PUBLIC_RATE_LIMIT_ENABLED
        value: "true"
      - key: PUBLIC_RATE_LIMIT_REQUESTS
        value: "60"
      - key: PUBLIC_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: AI_PROVIDER
        sync: false
      - key: AI_MODEL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        sync: false
